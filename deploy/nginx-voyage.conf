# /etc/nginx/sites-available/voyage
# Reverse proxy for the Voyage e-boarding app (docker, 127.0.0.1:4000).
# TLS is added by certbot after the domain is pointed (see README).

# Only send "Connection: upgrade" for actual WebSocket upgrades; for normal
# requests send "close". A hard-coded 'Connection "upgrade"' poisons keep-alive
# connections so the browser's reused connection fails to load static assets
# (curl works because it doesn't reuse the connection) — the classic blank-page
# symptom. This map is the standard nginx websocket-proxy pattern.
map $http_upgrade $voyage_conn_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name voyage.mn www.voyage.mn 157.245.203.209;

    client_max_body_size 15m; # Excel manifest uploads

    # compress the JS/CSS bundle (≈756 kB → ≈220 kB)
    gzip on;
    gzip_proxied any;
    gzip_types application/javascript text/css application/json image/svg+xml;
    gzip_min_length 1024;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Socket.IO websockets — upgrade only when the client asks to
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $voyage_conn_upgrade;
        proxy_read_timeout 120s;
    }
}

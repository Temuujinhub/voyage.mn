# /etc/nginx/sites-available/voyage
# Reverse proxy for the Voyage e-boarding app (docker, 127.0.0.1:4000).
# TLS is added by certbot after the domain is pointed (see DEPLOY.md).

server {
    listen 80;
    listen [::]:80;
    server_name voyage.mn www.voyage.mn 157.245.203.209;

    client_max_body_size 15m; # Excel manifest uploads

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Socket.IO websockets
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}

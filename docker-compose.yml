services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: voyage
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: voyage
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voyage -d voyage']
      interval: 5s
      timeout: 3s
      retries: 12

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://voyage:${DB_PASSWORD}@db:5432/voyage
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      QR_SECRET: ${QR_SECRET:?set QR_SECRET in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://voyage.mn}
    ports:
      - '127.0.0.1:4000:4000' # exposed only to host nginx

volumes:
  pgdata:

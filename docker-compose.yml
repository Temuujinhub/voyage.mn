# bounded json-file logs so long-running containers never fill the disk
x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: '10m'
      max-file: '3'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    <<: *logging
    environment:
      POSTGRES_USER: voyage
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: voyage
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voyage -d voyage']
      interval: 5s
      timeout: 3s
      retries: 12

  app:
    build: .
    restart: unless-stopped
    <<: *logging
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    environment:
      NODE_ENV: production
      PORT: 4000
      # discrete PG* vars (not a URL) so any DB_PASSWORD works without encoding
      PGHOST: db
      PGPORT: '5432'
      PGUSER: voyage
      PGPASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      PGDATABASE: voyage
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      QR_SECRET: ${QR_SECRET:?set QR_SECRET in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://voyage.mn}
    ports:
      - '127.0.0.1:4000:4000' # exposed only to host nginx

volumes:
  pgdata:
